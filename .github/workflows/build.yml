name: Build Site

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Clone feishin
        run: git clone https://github.com/jeffvli/feishin.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ===== 修复 chroma-js 缺失 =====
      - name: Patch chroma-js dependency
        working-directory: ./feishin
        run: |
          node -e "
          const fs=require('fs');
          const path='./package.json';
          const pkg=JSON.parse(fs.readFileSync(path,'utf8'));
          pkg.dependencies=pkg.dependencies||{};
          if(!pkg.dependencies['chroma-js']){
            pkg.dependencies['chroma-js']='^2.6.0';
            console.log('Added chroma-js dependency');
          } else {
            console.log('chroma-js already exists');
          }
          fs.writeFileSync(path, JSON.stringify(pkg,null,2));
          "

      - name: Install dependencies
        working-directory: ./feishin
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build web version
        working-directory: ./feishin
        run: npm run build:web

      # ===== 自动查找构建输出目录 =====
      - name: Detect build output directory
        id: detect
        run: |
          OUTDIR=$(dirname "$(find feishin -maxdepth 8 -type f -name index.html | head -n 1)")
          if [ -z "$OUTDIR" ]; then
            echo "❌ ERROR: Cannot find build output (index.html not found)"
            exit 1
          fi
          echo "Detected output directory: $OUTDIR"
          echo "outdir=$OUTDIR" >> $GITHUB_OUTPUT

      - name: Prepare static folder
        run: |
          mkdir -p static
          rm -rf static/*

      - name: Copy build output to static
        run: |
          cp -a "${{ steps.detect.outputs.outdir }}/." ./static/

      - name: Remove sourcemaps for Cloudflare Pages (25MiB limit)
        run: |
          find static -type f -name "*.map" -delete

      - name: Remove feishin source
        run: rm -rf feishin

      # ===== 原生 git 提交 =====
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static
          git commit -m "Update static site" || echo "No changes to commit"
          git push
